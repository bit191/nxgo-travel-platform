<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log in — Nxgo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="auth-page">
    <div class="auth-container">
      <!-- Left: Register prompt -->
      <div class="auth-panel auth-panel-grey">
        <h2>Don't have an account?</h2>
        <p class="auth-sub">Let's create an account!</p>
        <a href="register.html" class="btn btn-teal">Register</a>
      </div>

      <!-- Right: Login form -->
      <div class="auth-panel auth-panel-teal">
        <h2>Have an account?</h2>
        <p class="auth-sub">Let's log in to your account!</p>

        <div class="social-icons">
          <div class="social-icon" title="Google">G</div>
          <div class="social-icon" title="Facebook">f</div>
          <div class="social-icon" title="TikTok">♪</div>
          <div class="social-icon" title="Instagram">◎</div>
        </div>

        <form class="auth-form" id="login-form">
          <div class="auth-error" id="login-error"></div>
          <input type="email" id="login-email" placeholder="Enter your email!" required aria-label="Email">
          <input type="password" id="login-password" placeholder="Enter your password!" required aria-label="Password">
          <button type="submit" class="btn btn-white">Sign in</button>
        </form>
      </div>
    </div>
  </div>

  <script src="packages-extra.js"></script>
  <script src="seed.js"></script>
  <script src="images.js"></script>
  <script src="migrate.js"></script>
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if (NxgoAuth.isLoggedIn()) {
        window.location.href = 'profile.html';
        return;
      }

      document.getElementById('login-form').addEventListener('submit', e => {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const errorEl = document.getElementById('login-error');

        const result = NxgoAuth.login(email, password);
        if (result.error) {
          errorEl.textContent = result.error;
          return;
        }

        NxgoDB.logActivity({ type: 'page_view', page: 'login' });
        const redirect = result.user.role === 'admin' ? 'dashboard.html' : 'profile.html';
        window.location.href = redirect;
      });
    });
  </script>
</body>
</html>
