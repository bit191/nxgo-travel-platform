<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — Nxgo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="dashboard">

  <nav id="navbar"></nav>

  <main class="dashboard-page">
    <h1>Analytics Dashboard</h1>
    <p class="dash-sub">Real-time insights from your Nxgo platform data.</p>

    <div class="dash-stats">
      <div class="dash-stat-card">
        <div class="dash-num" id="stat-users">0</div>
        <div class="dash-label">Total Users</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-num" id="stat-packages">0</div>
        <div class="dash-label">Activities</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-num" id="stat-posts">0</div>
        <div class="dash-label">Forum Posts</div>
      </div>
      <div class="dash-stat-card">
        <div class="dash-num" id="stat-searches">0</div>
        <div class="dash-label">Searches</div>
      </div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3>New Signups Over Time</h3>
        <canvas id="chart-signups"></canvas>
      </div>
      <div class="chart-card">
        <h3>Forum Posts Over Time</h3>
        <canvas id="chart-posts"></canvas>
      </div>
      <div class="chart-card">
        <h3>Activity Categories</h3>
        <canvas id="chart-categories"></canvas>
      </div>
      <div class="chart-card">
        <h3>Interest Distribution</h3>
        <canvas id="chart-interests"></canvas>
      </div>
      <div class="chart-card wide">
        <h3>Most-Viewed Destinations</h3>
        <canvas id="chart-destinations"></canvas>
      </div>
    </div>
  </main>

  <footer id="footer"></footer>

  <script src="packages-extra.js"></script>
  <script src="seed.js"></script>
  <script src="images.js"></script>
  <script src="migrate.js"></script>
  <script src="data.js"></script>
  <script src="auth.js"></script>
  <script src="engage.js"></script>
  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
